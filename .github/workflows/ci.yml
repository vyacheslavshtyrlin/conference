name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify monorepo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Validate Docker Compose config
        run: docker compose config

  deploy:
    name: Deploy MVP server
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment:
      name: mvp-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          MVP_DEPLOY_HOST: ${{ secrets.MVP_DEPLOY_HOST }}
          MVP_DEPLOY_USER: ${{ secrets.MVP_DEPLOY_USER }}
          MVP_DEPLOY_PATH: ${{ secrets.MVP_DEPLOY_PATH }}
          MVP_DEPLOY_SSH_KEY: ${{ secrets.MVP_DEPLOY_SSH_KEY }}
        run: |
          test -n "$MVP_DEPLOY_HOST"
          test -n "$MVP_DEPLOY_USER"
          test -n "$MVP_DEPLOY_PATH"
          test -n "$MVP_DEPLOY_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$MVP_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan "$MVP_DEPLOY_HOST" >> ~/.ssh/known_hosts
          ssh "$MVP_DEPLOY_USER@$MVP_DEPLOY_HOST" "cd '$MVP_DEPLOY_PATH' && git pull --ff-only && if [ -f docker-compose.prod.yml ]; then docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build; else docker compose up -d --build; fi"
