name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify MVP repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Validate production Docker Compose config
        env:
          VITE_API_BASE_URL: https://example.com/api/v1
          VITE_SIGNALING_URL: wss://example.com/ws
          WEB_PUBLIC_URL: https://example.com
          SIGNALING_PUBLIC_URL: wss://example.com/ws
          JOIN_TOKEN_SECRET: test-secret
          WS_ALLOWED_ORIGINS: https://example.com
          MEDIASOUP_ANNOUNCED_IP: 127.0.0.1
        run: docker compose -f docker-compose.prod.yml config

  deploy:
    name: Deploy MVP server
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment:
      name: mvp-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          MVP_DEPLOY_HOST: ${{ secrets.MVP_DEPLOY_HOST }}
          MVP_DEPLOY_USER: ${{ secrets.MVP_DEPLOY_USER }}
          MVP_DEPLOY_PATH: ${{ secrets.MVP_DEPLOY_PATH }}
          MVP_DEPLOY_SSH_KEY: ${{ secrets.MVP_DEPLOY_SSH_KEY }}
        run: |
          require_secret() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required GitHub secret: $name"
              exit 1
            fi
          }
          require_secret "MVP_DEPLOY_HOST" "$MVP_DEPLOY_HOST"
          require_secret "MVP_DEPLOY_USER" "$MVP_DEPLOY_USER"
          require_secret "MVP_DEPLOY_PATH" "$MVP_DEPLOY_PATH"
          require_secret "MVP_DEPLOY_SSH_KEY" "$MVP_DEPLOY_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$MVP_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan "$MVP_DEPLOY_HOST" >> ~/.ssh/known_hosts
          ssh "$MVP_DEPLOY_USER@$MVP_DEPLOY_HOST" "cd '$MVP_DEPLOY_PATH' && git pull --ff-only && docker compose -f docker-compose.prod.yml up -d --build"
