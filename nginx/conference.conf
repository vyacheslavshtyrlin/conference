# Conference MVP — nginx site configuration
#
# Deploy to server:
#   export DOMAIN=conference.example.com
#   envsubst '$DOMAIN' < nginx/conference.conf \
#     | sudo tee /etc/nginx/sites-available/conference
#   sudo ln -s /etc/nginx/sites-available/conference /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d $DOMAIN
#
# After certbot runs it fills in ssl_certificate paths and adds HTTPS block.
# The /ws and /api/v1 proxy locations must survive certbot editing — certbot
# only touches the listen/server_name/ssl lines, not location blocks.

server {
    listen 80;
    server_name ${DOMAIN};

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/v1/ {
        proxy_pass         http://127.0.0.1:3000/api/v1/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket — must come before / to avoid the catch-all
    location /ws {
        proxy_pass          http://127.0.0.1:4000/ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
